<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beyond Ice and Steam</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #e8e8e8;
      font-family: Georgia, 'Times New Roman', serif;
      min-height: 100vh;
    }

    a { color: #B8A98A; text-decoration: none; }
    a:hover { text-decoration: underline; }

    nav {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 40px;
      background: rgba(10,10,10,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #1e1e1e;
    }
    .nav-brand {
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #B8A98A;
    }
    .nav-links {
      display: flex;
      gap: 8px;
    }
    .nav-links a {
      font-family: 'Courier New', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #888;
      padding: 5px 14px;
      border: 1px solid transparent;
      border-radius: 999px;
      transition: color 0.15s, border-color 0.15s;
    }
    .nav-links a:hover {
      color: #B8A98A;
      border-color: #B8A98A44;
      text-decoration: none;
    }

    #content {
      max-width: 680px;
      margin: 0 auto;
      padding: 60px 28px 100px;
    }

    #content h1 {
      font-size: 1.1rem;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #B8A98A;
      font-weight: 400;
      margin-bottom: 10px;
    }
    #content h3 {
      font-size: 2.2rem;
      font-weight: 700;
      color: #f0f0f0;
      line-height: 1.15;
      margin-bottom: 40px;
      font-family: Georgia, serif;
      font-style: italic;
    }
    #content hr {
      border: none;
      border-top: 1px solid #1e1e1e;
      margin: 48px 0;
    }
    #content p {
      font-size: 1.08rem;
      line-height: 1.9;
      color: #d8d8d8;
      margin-bottom: 1.6em;
      text-align: justify;
    }
    #content blockquote {
      border-left: 2px solid #2C5F6E;
      margin: 2em 0;
      padding: 0 0 0 24px;
      color: #6fa8bb;
      font-style: italic;
      font-size: 1.15rem;
      line-height: 1.8;
    }
    #content blockquote p { color: #6fa8bb; margin-bottom: 0; text-align: left; }
    #content strong { color: #f0f0f0; font-weight: 600; }
    #content em { font-style: italic; color: #e0e0e0; }

    /* Section divider \* \* \* */
    #content p:has(> em:only-child) {
      text-align: center;
      color: #B8A98A;
      letter-spacing: 0.3em;
      margin: 2.5em 0;
    }

    #content > p:last-child {
      font-family: 'Courier New', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      color: #333;
      text-transform: uppercase;
      margin-top: 60px;
      padding-top: 28px;
      border-top: 1px solid #1a1a1a;
      text-align: left;
    }

    #loading {
      max-width: 680px;
      margin: 120px auto;
      padding: 0 28px;
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #333;
    }

    #error-msg {
      display: none;
      max-width: 680px;
      margin: 120px auto;
      padding: 0 28px;
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      color: #663333;
    }

    footer {
      border-top: 1px solid #1a1a1a;
      padding: 28px 24px;
      text-align: center;
      font-family: 'Courier New', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: #333;
      text-transform: uppercase;
    }

    .chapter-nav {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 28px 40px;
      display: flex;
      justify-content: space-between;
      font-family: 'Courier New', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #444;
    }
    .chapter-nav a { color: #B8A98A; }
  </style>
</head>
<body>

  <nav>
    <span class="nav-brand"><a href="index.html" style="color:#B8A98A;">Beyond Ice and Steam</a></span>
    <div class="nav-links">
      <a href="index.html">All Chapters</a>
    </div>
  </nav>

  <main>
    <div id="loading">Loading chapter…</div>
    <div id="error-msg">Chapter not found.</div>
    <div id="content" style="display:none;"></div>

    <div class="chapter-nav" id="chapter-nav" style="display:none;">
      <span id="prev-link"></span>
      <a href="index.html">↑ All Chapters</a>
      <span id="next-link"></span>
    </div>
  </main>

  <footer>
    &copy; Sandy B. Patterson &mdash; Beyond Ice and Steam
  </footer>

  <script>
    const chapters = {
      1:  { file: 'chapters/ch01.md', title: 'The Most Familiar Stranger' },
      2:  { file: 'chapters/ch02.md', title: 'The Man Who Watched Water Think' },
      3:  { file: 'chapters/ch03.md', title: "Eleven Labs Can't Be Wrong" },
      4:  { file: 'chapters/ch04.md', title: 'The Excluded Zone' },
      5:  { file: 'chapters/ch05.md', title: 'Two Theories Walk Into a Lab' },
      6:  { file: 'chapters/ch06.md', title: "What Pollack Got Right, What He Can't Prove" },
      7:  { file: 'chapters/ch07.md', title: 'The Ghost in the Capillary' },
      8:  { file: 'chapters/ch08.md', title: 'The Engine in the Tree' },
      9:  { file: 'chapters/ch09.md', title: 'Why Your Soda Bubbles in One Spot' },
      10: { file: 'chapters/ch10.md', title: 'The Slippery Business of Surfaces' },
      11: { file: 'chapters/ch11.md', title: 'Water at the Edge of Life' },
      12: { file: 'chapters/ch12.md', title: 'When Science Leaves the Building' },
      13: { file: 'chapters/ch13.md', title: '$2,500 for a Glass of Water' },
    };

    const params = new URLSearchParams(window.location.search);
    const num = parseInt(params.get('c'), 10);
    const chapter = chapters[num];

    function chapLabel(n) {
      return `Ch ${n}`;
    }

    if (!chapter) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error-msg').style.display = 'block';
    } else {
      document.title = `Chapter ${num}: ${chapter.title} — Beyond Ice and Steam`;

      fetch(chapter.file)
        .then(r => {
          if (!r.ok) throw new Error('not found');
          return r.text();
        })
        .then(md => {
          document.getElementById('loading').style.display = 'none';
          const el = document.getElementById('content');
          el.innerHTML = marked.parse(md);
          el.style.display = 'block';

          const readerScript = document.createElement('script');
          readerScript.src = 'reader.js';
          document.body.appendChild(readerScript);

          const nav = document.getElementById('chapter-nav');
          nav.style.display = 'flex';
          if (chapters[num - 1]) {
            document.getElementById('prev-link').innerHTML =
              `<a href="chapter.html?c=${num-1}">← ${chapLabel(num-1)}</a>`;
          }
          if (chapters[num + 1]) {
            document.getElementById('next-link').innerHTML =
              `<a href="chapter.html?c=${num+1}">${chapLabel(num+1)} →</a>`;
          }
        })
        .catch(() => {
          document.getElementById('loading').style.display = 'none';
          document.getElementById('error-msg').style.display = 'block';
          document.getElementById('error-msg').textContent =
            `Chapter ${num} hasn't been converted yet. Check back soon.`;
        });
    }
  </script>

</body>
</html>
